<svg width="220" height="600" viewBox="0 0 220 600" xmlns="http://www.w3.org/2000/svg">
<style>
/* MIT License 商用自由修改 */
*{stroke:#222;stroke-width:1.4;fill:none;font-family:Arial;font-size:12}
.main-tick text{fill:#111}
.vernier-tick text{fill:#c82423}
</style>

<!-- 主尺竖底座（直上直下） -->
<rect x="70" y="20" width="80" height="560" fill="#f6f6f6"/>

<!-- 顶部内外测量爪 -->
<!-- 外爪 -->
<polygon points="70,20 30,20 30,60 70,60"/>
<polygon points="150,20 190,20 190,60 150,60"/>
<!-- 内爪 -->
<polygon points="70,30 45,30 45,50 70,50"/>
<polygon points="150,30 175,30 175,50 150,50"/>

<!-- 底部深度探针 -->
<rect x="102" y="560" width="16" height="30"/>

<!-- 主尺纵向刻度 0~15cm（竖直） -->
<g class="main-tick" transform="translate(110,60)">
  <!-- 厘米长线 -->
  <path d="M0,0 h-20 M0,50 h-20 M0,100 h-20 M0,150 h-20 M0,200 h-20 M0,250 h-20 M0,300 h-20 M0,350 h-20 M0,400 h-20 M0,450 h-20 M0,500 h-20"/>
  <!-- 毫米短线 -->
  <path d="M0,10 h-12 M0,20 h-12 M0,30 h-12 M0,40 h-12 M0,60 h-12 M0,70 h-12 M0,80 h-12 M0,90 h-12"/>
  <!-- 刻度数字（纵向排布） -->
  <text x="-28" y="5">0</text>
  <text x="-28" y="55">5</text>
  <text x="-28" y="105">10</text>
  <text x="-28" y="155">15</text>
  <text x="-28" y="205">20</text>
  <text x="-28" y="255">25</text>
  <text x="-28" y="305">30</text>
  <text x="-28" y="355">35</text>
  <text x="-28" y="405">40</text>
  <text x="-28" y="455">45</text>
  <text x="-28" y="505">50</text>
</g>

<!-- 滑动游标滑块（可上下移动） -->
<rect x="45" y="180" width="130" height="70" fill="#e9e9e9"/>
<!-- 锁紧旋钮 -->
<circle cx="170" cy="215" r="7" fill="#333"/>

<!-- 游标尺红色刻度 -->
<g class="vernier-tick" transform="translate(110,180)">
  <path d="M0,0 h-16 M0,10 h-8 M0,20 h-8 M0,30 h-8 M0,40 h-8 M0,50 h-16 M0,60 h-8"/>
  <text x="-24" y="5">0</text>
  <text x="-24" y="55">5</text>
</g>
</svg>
