<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 阴影层 -->
  <rect x="25" y="25" width="150" height="230" rx="12" fill="#bdc3c7" />
  <!-- 主体 -->
  <rect x="20" y="20" width="150" height="230" rx="12" fill="#34495e" />
  
  <!-- 液晶显示屏 -->
  <rect x="32" y="35" width="126" height="50" rx="4" fill="#a8bba0" stroke="#2c3e50" stroke-width="2"/>
  <g font-family="monospace" font-size="22" text-anchor="end" fill="#2c3e50">
    <!-- 初始状态 -->
    <text x="150" y="75" opacity="1">
      0
      <animate attributeName="opacity" values="1;0;0;0;0;1" dur="8s" repeatCount="indefinite" keyTimes="0;0.1;0.9;0.95;0.98;1" />
    </text>
    <!-- 输入 12 -->
    <text x="150" y="75" opacity="0">
      12
      <animate attributeName="opacity" values="0;1;1;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.35;0.4;1" />
    </text>
    <!-- 输入 + 34 -->
    <text x="150" y="75" opacity="0">
      12+34
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.4;0.45;0.65;0.7;1" />
    </text>
    <!-- 显示结果 46 -->
    <text x="150" y="75" opacity="0" font-weight="bold">
      46
      <animate attributeName="opacity" values="0;0;1;1;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.7;0.75;0.95;1" />
    </text>
  </g>

  <!-- 按钮矩阵 -->
  <g font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">
    <!-- 第一排 -->
    <rect x="35" y="100" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="49" y="116">7</text>
    <rect x="68" y="100" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="82" y="116">8</text>
    <rect x="101" y="100" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="115" y="116">9</text>
    <rect x="134" y="100" width="28" height="22" rx="3" fill="#f39c12" /> <text x="148" y="116" fill="white">÷</text>

    <!-- 第二排 -->
    <rect x="35" y="130" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="49" y="146">4</text>
    <rect x="68" y="130" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="82" y="146">5</text>
    <rect x="101" y="130" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="115" y="146">6</text>
    <rect x="134" y="130" width="28" height="22" rx="3" fill="#f39c12" /> <text x="148" y="146" fill="white">×</text>

    <!-- 第三排 -->
    <rect x="35" y="160" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="49" y="176">1</text>
    <rect x="68" y="160" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="82" y="176">2</text>
    <rect x="101" y="160" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="115" y="176">3</text>
    <rect x="134" y="160" width="28" height="22" rx="3" fill="#f39c12" /> <text x="148" y="176" fill="white">-</text>

    <!-- 第四排 -->
    <rect x="35" y="190" width="28" height="22" rx="3" fill="#e74c3c" /> <text x="49" y="206" fill="white">C</text>
    <rect x="68" y="190" width="28" height="22" rx="3" fill="#ecf0f1" /> <text x="82" y="206">0</text>
    <rect x="101" y="190" width="28" height="22" rx="3" fill="#2ecc71" /> <text x="115" y="206" fill="white">=</text>
    <rect x="134" y="190" width="28" height="22" rx="3" fill="#f39c12" /> <text x="148" y="206" fill="white">+</text>
  </g>

  
</svg>