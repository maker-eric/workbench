<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* MIT License */
    * { transform-origin: center; }
    /* 天地画布动画：俯仰上下+滚转旋转循环 */
    @keyframes attitudeAnim {
      0% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-24px) rotate(25deg); }
      50% { transform: translateY(0px) rotate(0deg); }
      75% { transform: translateY(24px) rotate(-25deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .earth-sky {
      animation: attitudeAnim 8s ease-in-out infinite;
    }
    .tick text { fill:#fff; font-size:11; font-family:Arial; }
    .crosshair { stroke:#fff; stroke-width:2.5; }
    .horizon-line { stroke:#fff; stroke-width:3; }
  </style>

  <!-- 仪表外圈黑边框 -->
  <circle cx="160" cy="160" r="152" fill="#111827" />
  <circle cx="160" cy="160" r="146" fill="#0f172a" stroke="#666" stroke-width="2"/>

  <!-- 天地容器（可旋转+上下平移） -->
  <g class="earth-sky">
    <!-- 天空区域（上半圆） -->
    <clipPath id="roundMask">
      <circle cx="160" cy="160" r="144"/>
    </clipPath>
    <g clip-path="url(#roundMask)">
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#90c3f0"/>
          <stop offset="50%" stop-color="#629fd8"/>
        </linearGradient>
        <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="50%" stop-color="#9c724f"/>
          <stop offset="100%" stop-color="#6d4c34"/>
        </linearGradient>
      </defs>
      <!-- 天空 -->
      <rect x="0" y="-300" width="320" height="300" fill="url(#skyGrad)"/>
      <!-- 地面 -->
      <rect x="0" y="160" width="320" height="300" fill="url(#groundGrad)"/>
      <!-- 地平线 -->
      <line class="horizon-line" x1="10" y1="160" x2="310" y2="160"/>

      <!-- 俯仰刻度线 -->
      <g stroke="#fff" stroke-width="1.5">
        <line x1="145" y1="100" x2="175" y2="100"/>
        <text x="180" y="104" fill="#fff">10°</text>
        <line x1="150" y1="130" x2="170" y2="130"/>
        <text x="180" y="134" fill="#fff">5°</text>
        <line x1="150" y1="190" x2="170" y2="190"/>
        <text x="180" y="194" fill="#fff">-5°</text>
        <line x1="145" y1="220" x2="175" y2="220"/>
        <text x="180" y="224" fill="#fff">-10°</text>
      </g>
    </g>
  </g>

  <!-- 外圈滚转刻度环（固定不动） -->
  <g class="tick" stroke="#fff" stroke-width="1.2">
    <!-- 左右±90、±45、0刻度 -->
    <line x1="160" y1="22" x2="160" y2="36"/>
    <text x="164" y="18">0</text>
    <line x1="74" y1="92" x2="84" y2="102" transform="rotate(-45 160 160)"/>
    <text x="56" y="96" transform="rotate(-45 160 160)">45</text>
    <line x1="22" y1="160" x2="36" y2="160"/>
    <text x="12" y="164">90</text>
    <line x1="236" y1="92" x2="246" y2="102" transform="rotate(45 160 160)"/>
    <text x="248" y="96" transform="rotate(45 160 160)">45</text>
    <line x1="284" y1="160" x2="298" y2="160"/>
    <text x="302" y="164">90</text>
  </g>

  <!-- 中心飞机十字标线（固定，永远不转） -->
  <g class="crosshair">
    <!-- 飞机主体横线 -->
    <line x1="110" y1="160" x2="210" y2="160"/>
    <!-- 机头竖线 -->
    <line x1="160" y1="140" x2="160" y2="180"/>
    <!-- 机翼小标识 -->
    <polygon points="110,160 122,152 122,168" fill="#fff"/>
    <polygon points="210,160 198,152 198,168" fill="#fff"/>
  </g>
</svg>
