<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 核心修复：显式指定中心点为 160, 160 */
    .earth-sky {
      transform-origin: 160px 160px;
      animation: attitudeAnim 8s ease-in-out infinite;
    }
    
    @keyframes attitudeAnim {
      0% { transform: rotate(0deg) translateY(0px); }
      25% { transform: rotate(25deg) translateY(-24px); }
      50% { transform: rotate(0deg) translateY(0px); }
      75% { transform: rotate(-25deg) translateY(24px); }
      100% { transform: rotate(0deg) translateY(0px); }
    }

    .tick text { fill:#fff; font-size:11; font-family:Arial; text-anchor: middle; }
    .crosshair { stroke:#fff; stroke-width:2.5; fill: none; }
    .horizon-line { stroke:#fff; stroke-width:3; }
    .pitch-text { font-family: Arial; font-size: 10px; fill: white; text-anchor: start; }
  </style>

  <!-- 定义区 -->
  <defs>
    <clipPath id="roundMask">
      <circle cx="160" cy="160" r="144"/>
    </clipPath>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90c3f0"/>
      <stop offset="100%" stop-color="#629fd8"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c724f"/>
      <stop offset="100%" stop-color="#6d4c34"/>
    </linearGradient>
  </defs>

  <!-- 仪表外圈 -->
  <circle cx="160" cy="160" r="152" fill="#111827" />
  <circle cx="160" cy="160" r="146" fill="#0f172a" stroke="#666" stroke-width="2"/>

  <!-- 静态裁剪层（包裹动画层） -->
  <g clip-path="url(#roundMask)">
    <!-- 天地容器（动画层） -->
    <g class="earth-sky">
      <!-- 天空 -->
      <rect x="-100" y="-300" width="520" height="460" fill="url(#skyGrad)"/>
      <!-- 地面 -->
      <rect x="-100" y="160" width="520" height="460" fill="url(#groundGrad)"/>
      <!-- 地平线 -->
      <line class="horizon-line" x1="-100" y1="160" x2="420" y2="160"/>

      <!-- 俯仰刻度 -->
      <g stroke="#fff" stroke-width="1.5">
        <!-- 10度 -->
        <line x1="145" y1="100" x2="175" y2="100"/>
        <text x="180" y="104" stroke="none" class="pitch-text">10</text>
        <!-- 5度 -->
        <line x1="152" y1="130" x2="168" y2="130"/>
        <!-- -5度 -->
        <line x1="152" y1="190" x2="168" y2="190"/>
        <!-- -10度 -->
        <line x1="145" y1="220" x2="175" y2="220"/>
        <text x="180" y="224" stroke="none" class="pitch-text">10</text>
      </g>
    </g>
  </g>

  <!-- 外圈滚转刻度（固定） -->
  <g class="tick" stroke="#fff" stroke-width="1.2">
    <line x1="160" y1="20" x2="160" y2="35"/>
    <text x="160" y="18">0</text>
    
    <g transform="rotate(-45 160 160)">
      <line x1="160" y1="20" x2="160" y2="30"/>
      <text x="160" y="18">45</text>
    </g>
    <g transform="rotate(45 160 160)">
      <line x1="160" y1="20" x2="160" y2="30"/>
      <text x="160" y="18">45</text>
    </g>
    <g transform="rotate(-90 160 160)">
      <line x1="160" y1="20" x2="160" y2="35"/>
      <text x="160" y="18">90</text>
    </g>
    <g transform="rotate(90 160 160)">
      <line x1="160" y1="20" x2="160" y2="35"/>
      <text x="160" y="18">90</text>
    </g>
  </g>

  <!-- 中心飞机十字标线（静态） -->
  <g class="crosshair">
    <line x1="100" y1="160" x2="140" y2="160"/>
    <line x1="180" y1="160" x2="220" y2="160"/>
    <line x1="160" y1="160" x2="160" y2="145"/>
    <!-- 机翼三角形标识 -->
    <path d="M140 160 L150 155 L150 165 Z" fill="#fff" stroke="none"/>
    <path d="M180 160 L170 155 L170 165 Z" fill="#fff" stroke="none"/>
    <!-- 中心圆点 -->
    <circle cx="160" cy="160" r="3" fill="#fff" stroke="none"/>
  </g>
</svg>